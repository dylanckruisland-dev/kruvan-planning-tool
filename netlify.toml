# Netlify applies these at build time (Vite inlines VITE_* vars).
# Prod Convex URL from: npx convex deploy --dry-run (team project “kruvan”).
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  VITE_CONVEX_URL = "https://decisive-bulldog-581.convex.cloud"
